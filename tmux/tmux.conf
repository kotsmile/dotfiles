
# tmux config — Zellij-style modal keybindings + Catppuccin Macchiato theme
# =============================================================================

# --- General settings --------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g status-interval 5

setw -g mode-keys vi

# Prefix: C-Space (fallback, rarely needed with modal keys)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Catppuccin Macchiato palette --------------------------------------------

%hidden crust="#181926"
%hidden base="#24273a"
%hidden surface0="#363a4f"
%hidden surface1="#494d64"
%hidden surface2="#5b6078"
%hidden text="#cad3f5"
%hidden sapphire="#7dc4e4"
%hidden blue="#8aadf4"
%hidden peach="#f5a97f"
%hidden green="#a6da95"
%hidden teal="#8bd5ca"
%hidden flamingo="#f0c6c6"
%hidden maroon="#ee99a0"
%hidden yellow="#eed49f"
%hidden mauve="#c6a0f6"
%hidden pink="#f5bde6"
%hidden red="#ed8796"

# --- Pane borders ------------------------------------------------------------

set -g pane-border-style "fg=#{surface0}"
set -g pane-active-border-style "fg=#{peach}"
set -g pane-border-lines single

# --- Status bar (Catppuccin Macchiato, matching zjstatus layout) -------------

set -g status-position bottom
set -g status-style "bg=#{surface0},fg=#{text}"

# Left: session name + mode indicator
set -g status-left-length 80
set -g status-left "\
#[bg=#{surface0}]#[fg=#{sapphire}]#[bg=#{sapphire}]#[fg=#{crust}]#[bold]#S\
#[bg=#{surface0}]#[fg=#{sapphire}] \
#{?#{==:#{client_key_table},root},\
#[bg=#{surface0}]#[fg=#{green}]#[bg=#{green}]#[fg=#{crust}]#[bold]NORMAL#[bg=#{surface0}]#[fg=#{green}],\
#{?#{==:#{client_key_table},pane},\
#[bg=#{surface0}]#[fg=#{teal}]#[bg=#{teal}]#[fg=#{crust}]#[bold]PANE#[bg=#{surface0}]#[fg=#{teal}],\
#{?#{==:#{client_key_table},tab},\
#[bg=#{surface0}]#[fg=#{teal}]#[bg=#{teal}]#[fg=#{crust}]#[bold]TAB#[bg=#{surface0}]#[fg=#{teal}],\
#{?#{==:#{client_key_table},resize},\
#[bg=#{surface0}]#[fg=#{yellow}]#[bg=#{yellow}]#[fg=#{crust}]#[bold]RESIZE#[bg=#{surface0}]#[fg=#{yellow}],\
#{?#{==:#{client_key_table},move},\
#[bg=#{surface0}]#[fg=#{yellow}]#[bg=#{yellow}]#[fg=#{crust}]#[bold]MOVE#[bg=#{surface0}]#[fg=#{yellow}],\
#{?#{==:#{client_key_table},session},\
#[bg=#{surface0}]#[fg=#{pink}]#[bg=#{pink}]#[fg=#{crust}]#[bold]SESSION#[bg=#{surface0}]#[fg=#{pink}],\
#{?#{==:#{client_key_table},prefix},\
#[bg=#{surface0}]#[fg=#{mauve}]#[bg=#{mauve}]#[fg=#{crust}]#[bold]TMUX#[bg=#{surface0}]#[fg=#{mauve}],\
#[bg=#{surface0}]#[fg=#{green}]#[bg=#{green}]#[fg=#{crust}]#[bold]NORMAL#[bg=#{surface0}]#[fg=#{green}]\
}}}}}}}\
#[bg=#{surface0}] "

# Right: user@host + datetime
set -g status-right-length 80
set -g status-right "\
#[bg=#{surface0}]#[fg=#{flamingo}]#[bg=#{flamingo}]#[fg=#{crust}] \
#[bg=#{surface1}]#[fg=#{flamingo}]#[bold] #(whoami)@#H \
#[bg=#{surface0}]#[fg=#{surface1}] \
#[bg=#{surface0}]#[fg=#{maroon}]#[bg=#{maroon}]#[fg=#{crust}] \
#[bg=#{surface1}]#[fg=#{maroon}]#[bold] %Y-%m-%d 󰅐 %H:%M \
#[bg=#{surface0}]#[fg=#{surface1}]"

# Window tabs (matching zjstatus tab style)
set -g status-justify left
setw -g window-status-separator "#[bg=#{surface0}] "

setw -g window-status-format "\
#[bg=#{surface0}]#[fg=#{blue}]#[bg=#{blue}]#[fg=#{crust}]#[bold]#I \
#[bg=#{surface1}]#[fg=#{blue}]#[bold] #W\
#[bg=#{surface0}]#[fg=#{surface1}]"

setw -g window-status-current-format "\
#[bg=#{surface0}]#[fg=#{peach}]#[bg=#{peach}]#[fg=#{crust}]#[bold]#I \
#[bg=#{surface1}]#[fg=#{peach}]#[bold] #W#{?window_zoomed_flag,󰊓,}#{?pane_synchronized,,}\
#[bg=#{surface0}]#[fg=#{surface1}]"

# Message/command style
set -g message-style "bg=#{surface1},fg=#{text}"
set -g message-command-style "bg=#{surface1},fg=#{text}"

# Copy-mode highlight
setw -g mode-style "bg=#{surface2},fg=#{text}"

# Copy-mode vi bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi o send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "tr -d '\\n' | grep -oE 'https?://[^ >)\"]+' | head -1 | xargs open"

# --- Unbind defaults ---------------------------------------------------------

unbind -a -T root
unbind -a -T prefix

# Re-bind prefix activation
bind -T root C-Space switch-client -T prefix

# --- Root table (global, no prefix) ------------------------------------------

# Alt h/l: select pane left/right (or prev/next window if edge/single pane)
bind -T root M-h if-shell "[ $(tmux list-panes | wc -l) -eq 1 ]" "previous-window" "select-pane -L"
bind -T root M-l if-shell "[ $(tmux list-panes | wc -l) -eq 1 ]" "next-window" "select-pane -R"
bind -T root M-j select-pane -D
bind -T root M-k select-pane -U

# Alt arrows: same
bind -T root M-Left  if-shell "[ $(tmux list-panes | wc -l) -eq 1 ]" "previous-window" "select-pane -L"
bind -T root M-Right if-shell "[ $(tmux list-panes | wc -l) -eq 1 ]" "next-window" "select-pane -R"
bind -T root M-Down  select-pane -D
bind -T root M-Up    select-pane -U

# Alt +/-: expand/shrink current pane by 10 in each direction
# bind -T root M-= resize-pane -U 10 \; resize-pane -D 10 \; resize-pane -L 10 \; resize-pane -R 10
bind -T root M-- run-shell "w=$(tmux display -p '#{pane_width}'); h=$(tmux display -p '#{pane_height}'); tmux resize-pane -x $((w > 20 ? w - 20 : w)) -y $((h > 20 ? h - 20 : h))"
bind -T root M-= run-shell "w=$(tmux display -p '#{pane_width}'); h=$(tmux display -p '#{pane_height}'); tmux resize-pane -x $((w + 20)) -y $((h + 20))"

# Alt layout cycling
bind -T root M-[ previous-layout
bind -T root M-] next-layout

# Alt q: quit (confirm)
bind -T root M-q confirm-before -p "Kill this tmux session? (y/n)" kill-session

# --- Mode switches (root → key table) ---------------------------------------

bind -T root M-p switch-client -T pane
bind -T root M-t switch-client -T tab
bind -T root M-n switch-client -T resize
bind -T root M-m switch-client -T move
bind -T root M-s copy-mode
bind -T root M-o switch-client -T session
bind -T root M-b switch-client -T prefix

# --- Pane mode (Alt-p, then key → returns to root) --------------------------

bind -T pane n   split-window -h -c "#{pane_current_path}"
bind -T pane d   split-window -v -c "#{pane_current_path}"
bind -T pane r   split-window -h -c "#{pane_current_path}"
bind -T pane x   kill-pane
bind -T pane f   resize-pane -Z
bind -T pane h   select-pane -L
bind -T pane j   select-pane -D
bind -T pane k   select-pane -U
bind -T pane l   select-pane -R
bind -T pane p   select-pane -t :.+
bind -T pane w   display-popup -w 80% -h 80% -E
bind -T pane c   command-prompt -p "Pane title:" "select-pane -T '%%'"
# Alt-p again exits
bind -T pane M-p switch-client -T root
bind -T pane Escape switch-client -T root

# --- Tab mode (Alt-t, stays in mode until Esc) ------------------------------

bind -T tab n     new-window -c "#{pane_current_path}"
bind -T tab x     confirm-before -p "Kill window #W? (y/n)" kill-window
bind -T tab r     command-prompt -p "Rename window:" "rename-window '%%'"
bind -T tab h     previous-window                      \; switch-client -T tab
bind -T tab Left  previous-window                      \; switch-client -T tab
bind -T tab l     next-window                          \; switch-client -T tab
bind -T tab Right next-window                          \; switch-client -T tab
bind -T tab 1     select-window -t :1                  \; switch-client -T tab
bind -T tab 2     select-window -t :2                  \; switch-client -T tab
bind -T tab 3     select-window -t :3                  \; switch-client -T tab
bind -T tab 4     select-window -t :4                  \; switch-client -T tab
bind -T tab 5     select-window -t :5                  \; switch-client -T tab
bind -T tab 6     select-window -t :6                  \; switch-client -T tab
bind -T tab 7     select-window -t :7                  \; switch-client -T tab
bind -T tab 8     select-window -t :8                  \; switch-client -T tab
bind -T tab 9     select-window -t :9                  \; switch-client -T tab
bind -T tab Tab   last-window                          \; switch-client -T tab
bind -T tab H     swap-window -t -1 \; previous-window \; switch-client -T tab
bind -T tab L     swap-window -t +1 \; next-window     \; switch-client -T tab
bind -T tab s     setw synchronize-panes
# Alt-t again exits
bind -T tab M-t   switch-client -T root
bind -T tab Escape switch-client -T root

# --- Resize mode (Alt-n, stays in mode until Esc) ---------------------------

bind -T resize h     resize-pane -L 2 \; switch-client -T resize
bind -T resize j     resize-pane -D 2 \; switch-client -T resize
bind -T resize k     resize-pane -U 2 \; switch-client -T resize
bind -T resize l     resize-pane -R 2 \; switch-client -T resize
bind -T resize Left  resize-pane -L 2 \; switch-client -T resize
bind -T resize Down  resize-pane -D 2 \; switch-client -T resize
bind -T resize Up    resize-pane -U 2 \; switch-client -T resize
bind -T resize Right resize-pane -R 10 \; switch-client -T resize
bind -T resize H     resize-pane -L 10 \; switch-client -T resize
bind -T resize J     resize-pane -D 10 \; switch-client -T resize
bind -T resize K     resize-pane -U 10 \; switch-client -T resize
bind -T resize L     resize-pane -R 10 \; switch-client -T resize
bind -T resize +     resize-pane -Z   \; switch-client -T resize
bind -T resize =     resize-pane -Z   \; switch-client -T resize
bind -T resize -     resize-pane -Z   \; switch-client -T resize
# Exit resize mode
bind -T resize Escape switch-client -T root
bind -T resize Enter  switch-client -T root
bind -T resize M-n    switch-client -T root

# --- Move mode (Alt-m, stays in mode until Esc) -----------------------------

bind -T move h     swap-pane -s '{left-of}'  \; switch-client -T move
bind -T move j     swap-pane -s '{down-of}'  \; switch-client -T move
bind -T move k     swap-pane -s '{up-of}'    \; switch-client -T move
bind -T move l     swap-pane -s '{right-of}' \; switch-client -T move
bind -T move n     swap-pane -D \; switch-client -T move
bind -T move Tab   swap-pane -D \; switch-client -T move
bind -T move p     swap-pane -U \; switch-client -T move
# Exit move mode
bind -T move Escape switch-client -T root
bind -T move Enter  switch-client -T root
bind -T move M-m    switch-client -T root

# --- Session mode (Alt-o, then key → returns to root) -----------------------

bind -T session d detach-client
bind -T session w choose-tree -Zs
# Alt-o again exits
bind -T session M-o    switch-client -T root
bind -T session Escape switch-client -T root

# --- Prefix/tmux-compat mode (Alt-b, classic tmux) --------------------------

bind -T prefix c   new-window -c "#{pane_current_path}"
bind -T prefix '"' split-window -v -c "#{pane_current_path}"
bind -T prefix %   split-window -h -c "#{pane_current_path}"
bind -T prefix x   confirm-before -p "Kill pane? (y/n)" kill-pane
bind -T prefix z   resize-pane -Z
bind -T prefix d   detach-client
bind -T prefix n   next-window
bind -T prefix p   previous-window
bind -T prefix w   choose-tree -Zw
bind -T prefix s   choose-tree -Zs
bind -T prefix ,   command-prompt -p "Rename window:" "rename-window '%%'"
bind -T prefix [   copy-mode
bind -T prefix h   select-pane -L
bind -T prefix j   select-pane -D
bind -T prefix k   select-pane -U
bind -T prefix l   select-pane -R
bind -T prefix 1   select-window -t :1
bind -T prefix 2   select-window -t :2
bind -T prefix 3   select-window -t :3
bind -T prefix 4   select-window -t :4
bind -T prefix 5   select-window -t :5
bind -T prefix 6   select-window -t :6
bind -T prefix 7   select-window -t :7
bind -T prefix 8   select-window -t :8
bind -T prefix 9   select-window -t :9
bind -T prefix o   select-pane -t :.+
bind -T prefix Space next-layout
bind -T prefix :   command-prompt

# Mouse bindings (must re-bind after unbind -a)
bind -T root MouseDown1Pane   select-pane -t = \; send-keys -M
bind -T root MouseDrag1Pane   if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind -T root WheelUpPane      if-shell -F "#{mouse_any_flag}" "send-keys -M" "if-shell -F '#{alternate_on}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
bind -T root WheelDownPane    send-keys -M
bind -T root MouseDown1Status select-window -t =
bind -T root MouseDown3Pane   if-shell -F "#{mouse_any_flag}" "send-keys -M" "display-menu -T '#[align=centre]#{pane_index} (#{pane_id})' -t = -x M -y M 'Kill' x 'kill-pane' 'Zoom' z 'resize-pane -Z'"
